# Set the TURN/STUN server listener port for UDP and TCP.
listening-port=3478


# Use long-term credential mechanism.
lt-cred-mech

# Set the realm to be used for the users.
realm=miraishi

# Turn off the CLI support.
no-cli

# Do not start TLS client listener.
no-tls

# Do not start DTLS client listener.
no-dtls

# Use verbose logging for debugging (optional)
# verbose

# Dynamic UDP port range for relaying
min-port=50000
max-port=51000
use-auth-secret
static-auth-secret=YOUR_SECRET_HERE
